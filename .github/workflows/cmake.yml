name: C++ CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: false
        default: 'Debug'
        type: choice
        options: [Debug, Release, RelWithDebInfo, MinSizeRel]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    env:
      CC: ${{ matrix.c }}
      CXX: ${{ matrix.cxx }}
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'Debug' }}
      EXECUTABLE_NAME: "oop"
      INPUT_FILENAME: "tastatura.txt"
      BUILD_DIR: "build"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            c: clang-18
            cxx: clang++-18
            name: Ubuntu 24.04 Clang 18
            cmake_flags: -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

          - os: ubuntu-24.04
            c: gcc-13
            cxx: g++-13
            name: Ubuntu 24.04 GCC 13
            cmake_flags: -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare env
        run: |
          mkdir -p artifacts
          echo "0" > "${INPUT_FILENAME}"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build valgrind cppcheck jq \
                                 libc++-18-dev libc++abi-18-dev

      - name: Build & Install
        run: |
          cmake -S . -B "${BUILD_DIR}" \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_INSTALL_PREFIX=./artifacts \
            ${{ matrix.cmake_flags }}
          
          cmake --build "${BUILD_DIR}" --config ${BUILD_TYPE} -j $(nproc)
          cmake --install "${BUILD_DIR}" --config ${BUILD_TYPE}

      - name: Memory Check (Valgrind on GCC)
        if: runner.os == 'Linux' && startsWith(matrix.cxx, 'g++')
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./${BUILD_DIR}/${EXECUTABLE_NAME} < "${INPUT_FILENAME}"

      - name: Memory Check (ASan on Clang)
        if: runner.os == 'Linux' && startsWith(matrix.cxx, 'clang++')
        run: |
          ./${BUILD_DIR}/${EXECUTABLE_NAME} < "${INPUT_FILENAME}"

      - name: Static Analysis (Cppcheck)
        if: runner.os == 'Linux'
        run: |
          cppcheck --enable=all --project="${BUILD_DIR}"/compile_commands.json \
            --suppress=missingIncludeSystem --error-exitcode=1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}_${{ matrix.name }}_${{ matrix.cxx }}
          path: artifacts/
          retention-days: 5